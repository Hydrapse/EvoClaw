# EvoClaw Trial Configuration
# Copy this file to trial_config.yaml and edit.
#
# Usage:
#   python scripts/run_all.py --config trial_config.yaml
#
# Monitor progress:
#   ./scripts/monitor.sh <trial_name>

# Path to EvoClaw-data (cloned from HuggingFace)
data_root: /path/to/EvoClaw-data

# Trial name. Two forms:
#   "my_experiment"     → run_all.py picks the latest matching _NNN
#                         (resume by default; --force wipes that one;
#                         --new bumps to next _NNN). First run = _001.
#   "my_experiment_002" → fixed; used as-is by all repos, no suffix logic.
trial_name: my_experiment

# Agent framework: claude-code | codex | gemini-cli | openhands
agent: claude-code

# Model identifier. For Claude Code, use the bare ID (e.g. claude-opus-4-7)
# or append [1m] for the 1M-context variant (claude-opus-4-7[1m]).
model: claude-opus-4-7

# Max agent runtime per repo (seconds)
timeout: 18000

# Reasoning effort: low | medium | high | xhigh | max
# Controls the model's thinking depth. Not all agents/models support this.
# reasoning_effort: high

# ─── Optional ───────────────────────────────────────────

# Run specific repos only (default: all repos found in data_root)
# Use substring matching — "navidrome" matches "navidrome_navidrome_v0.57.0_v0.58.0"
# repos:
#   - navidrome
#   - ripgrep
#   - dubbo

# Override the model Claude Code uses for background tasks (skill listing,
# auto-memory, subagent spawning, context management). By default Claude
# Code uses Haiku for these. When running through a proxy or third-party
# endpoint, Haiku requests may route to a different (possibly expensive)
# backend. Set this to your main model to keep all requests on the same
# endpoint.
# default_haiku_model: glm-5.1

# Deploy claude-code-router-py inside the container to translate between
# Anthropic Messages API and OpenAI chat/completions format. Only applies
# to claude-code agent. Use when running Claude Code against non-Anthropic
# models (e.g., GLM, GPT, Gemini) through an OpenAI-compatible endpoint.
# You do NOT need this when using Claude Code with its native model.
# api_router: true
